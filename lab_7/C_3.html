<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .scientificCalc
        {
            width: 350px;
            margin:50px auto;
            padding:20px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }
        #display
        {
            width:100%;
            height:80px;
            font-size:22px;
            text-align:right;
            margin-bottom:10px;
            padding:10px;
            box-sizing:border-box;
            border-radius: 10px;
        }
        #buttons{
            display:grid;
            grid-template-columns:repeat(6,1fr);
            gap:10px;
        }
        button{
            padding:16px;
            font-size:20px;
            cursor:pointer;
        }
        #operator
        {
            background: rgb(236, 212, 177);
            font-size: 20px;
            color: rgb(34, 76, 115);
        }
        #number
        {
            background-color:rgb(157, 200, 186);
        }
        #clear
        {
            background-color: rgb(217, 163, 63);
        }
        #back
        {
            background-color: rgb(217, 163, 63);
        }
        #equl
        {
            background-color: rgb(167, 173, 145);
        }
        #tringnometric
        {
            background-color: rgb(180, 103, 106);
        }
    </style>
</head>
<body>
    <div class="scientificCalc">
        <input type="text" id="display" readonly>

        <div id="buttons">

            <button id="clear" onclick="clearDisplay()">C</button>
            <button id="back" onclick="backSpace()">⌫</button>
            <button id="operator" onclick="press('(')">(</button>
            <button id="operator" onclick="press(')')">)</button>
            <button id="operator" onclick="press('/')">/</button>
            <br>

            <button id="number" onclick="press('7')">7</button>
            <button id="number" onclick="press('8')">8</button>
            <button id="number" onclick="press('9')">9</button>
            <button id="operator" onclick="press('*')">*</button>
            <button id="operator" onclick="sqrt()">√</button>
            <br>

            <button id="number" onclick="press('4')">4</button>
            <button id="number" onclick="press('5')">5</button>
            <button id="number" onclick="press('6')">6</button>
            <button id="operator" onclick="press('-')">-</button>
            <button id="operator" onclick="squre()">x²</button>
            <br>

            <button id="number" onclick="press('1')">1</button>
            <button id="number" onclick="press('2')">2</button>
            <button id="number" onclick="press('3')">3</button>
            <button id="operator" onclick="press('+')">+</button>
            <button id="operator" onclick="power()">xʸ</button>
            <br>
            
            <button id="number" onclick="press('0')">0</button>
            <button id="number" onclick="press('.')">.</button>
            <button id="equl" onclick="equl()">=</button>
            <button id="tringnometric" onclick="sin()">sin</button>
            <button id="tringnometric" onclick="cos()">cos</button>
            <br>

            <button id="tringnometric" onclick="tan()">tan</button>
            <button id="tringnometric" onclick="log()">log</button>
            <button id="tringnometric" onclick="ln()">ln</button>
            <button id="tringnometric" onclick="pi()">π</button>
            <button id="operator" onclick="press('%')">%</button>

        </div>
    </div>

    <script>
        let display = document.getElementById("display");

        function clearDisplay()
        {
            display.value = "";
        }
        function backSpace()
        {
            display.value = display.value.slice(0,-1);
        }
        function press(value)
        {
            display.value += value 
        }
        function sqrt()
        {
            display.value = Math.sqrt(eval(display.value));
        }
        function power()
        {
            display.value = Math.pow(eval(display.value));
        }
        function equl()
        {
            try
            {
                display.value = eval(display.value);
            }
            catch(error)
            {
                display.value = "Error";
            }
        }
        function sin()
        {
            display.value = Math.sin(eval(display.value) * Math.PI / 180);
        }
        function cos()
        {
            display.value = Math.cos(eval(display.value) * Math.PI / 180);
        }
        function tan()
        {
            display.value = Math.tan(eval(display.value) * Math.PI / 180);
        }
        function log()
        {
            display.value = Math.log10(eval(display.value));
        }
        function ln()
        {
            display.value = Math.log(eval(display.value));
        }
        function pi()
        {
            display.value += Math.PI;
        }

    </script>
</body>
</html>
