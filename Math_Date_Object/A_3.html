<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = Math.random() * 10 ;

        document.write("Random Number : " + num + "</br>");

        document.write("Floor Number : " + Math.floor(num) + "</br>");
        document.write("Ceil Number : " + Math.ceil(num) + "</br>");
        document.write("Round Number : " + Math.round(num) + "</br>");
        document.write("Truncate Number : " + Math.trunc(num) + "</br>");
    </script>
</body>
</html>
