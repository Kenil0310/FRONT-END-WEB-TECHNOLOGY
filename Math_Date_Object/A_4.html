<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        dt = new Date();

        document.write("Current Date : " + dt.getDate() + "</br>");
        document.write("Time : " + dt.getTime() + "</br>");
        document.write("Day : " + dt.getDay() + "</br>");
        document.write("Month : " + (dt.getMonth() + 1) + "</br>");
        document.write("Year : " + dt.getFullYear() + "</br>");

        

    </script>
</body>
</html>
